<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Site Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --surface2: #1f1f24;
    --border: #2a2a32;
    --accent: #6ee7b7;
    --accent-dim: rgba(110,231,183,0.12);
    --accent-glow: rgba(110,231,183,0.25);
    --text: #f0f0f4;
    --text-muted: #7a7a8c;
    --user-bubble: #1e2d28;
    --user-border: #2d4a3a;
    --bot-bubble: #1a1a20;
    --radius: 16px;
    --radius-sm: 8px;
  }

  html, body {
    height: 100%;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  #widget-root {
    width: 100%;
    height: 100vh;
    min-height: 500px;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }

  /* Ambient glow bg */
  #widget-root::before {
    content: '';
    position: absolute;
    top: -80px; left: 50%;
    transform: translateX(-50%);
    width: 400px; height: 250px;
    background: radial-gradient(ellipse, rgba(110,231,183,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  

  /* CHAT SCREEN */
  #chat-screen {
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative;
    z-index: 1;
  }

  /* Header */
  #chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,15,17,0.85);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .header-icon {
    width: 34px; height: 34px;
    background: var(--accent-dim);
    border: 1px solid rgba(110,231,183,0.3);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .header-text { flex: 1; }
  .header-title { font-size: 14px; font-weight: 500; letter-spacing: -0.2px; }
  .header-sub { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
  .status-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--accent);
    animation: pulse-dot 2.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome */
  .welcome-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .welcome-card h3 { font-size: 15px; font-weight: 500; }
  .welcome-card p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

  .starter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .chip {
    padding: 7px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Message rows */
  .msg-row { display: flex; gap: 10px; align-items: flex-start; }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .avatar.bot {
    background: var(--accent-dim);
    border: 1px solid rgba(110,231,183,0.25);
  }
  .avatar.user-av {
    background: #1e2333;
    border: 1px solid #2d3450;
  }

  .bubble {
    max-width: 82%;
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.65;
    word-break: break-word;
  }

  .bubble.bot {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid var(--user-border);
    border-top-right-radius: 4px;
    color: #d4f5e7;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }
  .typing-indicator span {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Error */
  .error-msg {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 12.5px;
    color: #fca5a5;
  }

  /* Input area */
  #input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: rgba(15,15,17,0.9);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: rgba(110,231,183,0.4); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    resize: none;
    min-height: 20px;
    max-height: 120px;
    line-height: 1.5;
  }
  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    width: 32px; height: 32px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { box-shadow: 0 0 14px var(--accent-glow); opacity: 0.9; }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #send-btn svg { width: 15px; height: 15px; fill: #0a1a13; }

  .powered-by {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 0.03em;
  }
  .powered-by span { color: rgba(110,231,183,0.6); }

  /* Fade-in animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row { animation: fadeUp 0.25s ease forwards; }
</style>
</head>
<body>
<div id="widget-root">
  <!-- ═══════════════ CHAT SCREEN ═══════════════ -->
  <div id="chat-screen">
    <div id="chat-header">
      <div class="header-icon">🔮</div>
      <div class="header-text">
        <div class="header-title" id="header-title">Site Assistant</div>
        <div class="header-sub"><div class="status-dot"></div> Online · Ask me anything</div>
      </div>
      <button class="reset-btn" onclick="resetChat()">New chat</button>
    </div>

    <div id="messages">
      <div class="welcome-card" id="welcome-card">
        <h3>👋 Hello!</h3>
        <p id="welcome-text">I'm your site assistant. I can answer questions about the content and resources on this site.</p>
        <div class="starter-chips" id="starter-chips">
          <div class="chip" onclick="sendChip(this)">What's on this site?</div>
          <div class="chip" onclick="sendChip(this)">How do I get started?</div>
          <div class="chip" onclick="sendChip(this)">What resources are available?</div>
          <div class="chip" onclick="sendChip(this)">Who do I contact for help?</div>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div class="input-row">
        <textarea id="user-input" placeholder="Ask a question…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="powered-by">Powered by <span>OpenAI Assistants API</span></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG — credentials pre-configured
// ═══════════════════════════════════════════════
let config = {
  apiKey:         'cloudflare-managed',
  assistantId:    'asst_QKs8dwl70YagOQLsOlv0w5q4',
  welcomeMessage: 'Hi! Ask me anything about Hearst California advertising rates and resources.'
};

let threadId = null;
let isLoading = false;

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init() {
  // Credentials pre-configured — go straight to chat
  showChat();
}

function showChat() {
  document.getElementById('welcome-text').textContent = config.welcomeMessage;
}

// ═══════════════════════════════════════════════
//  THREAD MANAGEMENT
// ═══════════════════════════════════════════════
async function getOrCreateThread() {
  if (threadId) return threadId;

  const res = await fetch('https://bold-feather-0757.michael-chiprich.workers.dev/v1/threads', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer cloudflare-managed',
      'Content-Type': 'application/json',
      'OpenAI-Beta': 'assistants=v2'
    },
    body: JSON.stringify({})
  });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'Failed to create thread');
  }

  const data = await res.json();
  threadId = data.id;
  return threadId;
}

// ═══════════════════════════════════════════════
//  MESSAGING
// ═══════════════════════════════════════════════
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendChip(el) {
  document.getElementById('user-input').value = el.textContent;
  sendMessage();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  // Hide welcome card
  const wc = document.getElementById('welcome-card');
  if (wc) wc.remove();

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', text);
  const typingEl = appendTyping();

  try {
    const tid = await getOrCreateThread();

    // Add message to thread
    await fetch(`https://bold-feather-0757.michael-chiprich.workers.dev/v1/threads/${tid}/messages`, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer cloudflare-managed',
        'Content-Type': 'application/json',
        'OpenAI-Beta': 'assistants=v2'
      },
      body: JSON.stringify({ role: 'user', content: text })
    });

    // Create run
    const runRes = await fetch(`https://bold-feather-0757.michael-chiprich.workers.dev/v1/threads/${tid}/runs`, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer cloudflare-managed',
        'Content-Type': 'application/json',
        'OpenAI-Beta': 'assistants=v2'
      },
      body: JSON.stringify({ assistant_id: config.assistantId })
    });

    if (!runRes.ok) {
      const err = await runRes.json();
      throw new Error(err.error?.message || 'Run failed');
    }

    const run = await runRes.json();
    const reply = await pollRun(tid, run.id);
    typingEl.remove();
    appendMessage('bot', reply);

  } catch(err) {
    typingEl.remove();
    appendError(err.message);
    console.error(err);
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

async function pollRun(tid, runId) {
  const maxWait = 60000; // 60 seconds
  const interval = 1200;
  const start = Date.now();

  while (Date.now() - start < maxWait) {
    await sleep(interval);

    const res = await fetch(`https://bold-feather-0757.michael-chiprich.workers.dev/v1/threads/${tid}/runs/${runId}`, {
      headers: {
        'Authorization': 'Bearer cloudflare-managed',
        'OpenAI-Beta': 'assistants=v2'
      }
    });

    const data = await res.json();
    const status = data.status;

    if (status === 'completed') {
      return await getLatestMessage(tid);
    }
    if (['failed', 'cancelled', 'expired'].includes(status)) {
      throw new Error(`Run ${status}: ${data.last_error?.message || 'Unknown error'}`);
    }
    // queued / in_progress / cancelling → keep polling
  }

  throw new Error('Response timed out. Please try again.');
}

async function getLatestMessage(tid) {
  const res = await fetch(`https://bold-feather-0757.michael-chiprich.workers.dev/v1/threads/${tid}/messages?limit=1&order=desc`, {
    headers: {
      'Authorization': 'Bearer cloudflare-managed',
      'OpenAI-Beta': 'assistants=v2'
    }
  });
  const data = await res.json();
  const msg = data.data?.[0];
  if (!msg || msg.role !== 'assistant') return 'No response received.';

  return msg.content
    .filter(c => c.type === 'text')
    .map(c => c.text.value)
    .join('\n\n');
}

// ═══════════════════════════════════════════════
//  DOM HELPERS
// ═══════════════════════════════════════════════
function appendMessage(role, text) {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role === 'user' ? 'user' : ''}`;

  const avatarEmoji = role === 'user' ? '👤' : '🔮';
  const avatarClass = role === 'user' ? 'user-av' : 'bot';
  const bubbleClass = role === 'user' ? 'user' : 'bot';

  row.innerHTML = `
    <div class="avatar ${avatarClass}">${avatarEmoji}</div>
    <div class="bubble ${bubbleClass}">${escapeAndFormat(text)}</div>
  `;

  container.appendChild(row);
  scrollToBottom();
  return row;
}

function appendTyping() {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="avatar bot">🔮</div>
    <div class="bubble bot">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  container.appendChild(row);
  scrollToBottom();
  return row;
}

function appendError(msg) {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'error-msg';
  el.textContent = `⚠️ Error: ${msg}`;
  container.appendChild(el);
  scrollToBottom();
}

function escapeAndFormat(text) {
  // Basic: escape HTML then convert newlines and bold markdown
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return escaped
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br/>');
}

function scrollToBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

function resetChat() {
  threadId = null;
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
    <div class="welcome-card" id="welcome-card">
      <h3>👋 Hello!</h3>
      <p id="welcome-text">${config.welcomeMessage || "I'm your site assistant. I can answer questions about the content and resources on this site."}</p>
      <div class="starter-chips" id="starter-chips">
        <div class="chip" onclick="sendChip(this)">What's on this site?</div>
        <div class="chip" onclick="sendChip(this)">How do I get started?</div>
        <div class="chip" onclick="sendChip(this)">What resources are available?</div>
        <div class="chip" onclick="sendChip(this)">Who do I contact for help?</div>
      </div>
    </div>
  `;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════
init();
</script>
</body>
</html>
